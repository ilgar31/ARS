{% extends 'ars/header.html' %}


{% block title %}

{% block content %}
{% load static %}
<h1>НАШИ РАБОТЫ</h1>
<div class="container">
    {% for object in objects %}
        <div class="object">
            <div class="img_object"><img src="{% static object.photo %}" class="img_data"></div>
            <p>{{ object }}</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
